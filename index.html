<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>정왕고 실시간 분실물 센터</title>
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {

</head>
<body class="bg-slate-50 text-slate-800 dark:bg-slate-900 dark:text-slate-100 transition-colors duration-300">

  <!-- Modern Firebase SDK (v11.6.1) 및 동기화 모듈 설정 -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
    import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, deleteDoc, updateDoc, onSnapshot, collection } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

    // 기본 파이어베이스 설정 정보
    const defaultFirebaseConfig = {
      apiKey: "AIzaSyBQF0C--pfZB527zRgJXuwxHJOhlAXViMA",
      authDomain: "jw-lost-found.firebaseapp.com",
      projectId: "jw-lost-found",
      storageBucket: "jw-lost-found.firebasestorage.app",
      messagingSenderId: "777567724635",
      appId: "1:777567724635:web:96c7a198c889e0474dcb7e"
    };

    // 환경 변수 검증 및 폴백 구성
    const firebaseConfig = typeof __firebase_config !== 'undefined' 
      ? JSON.parse(__firebase_config) 
      : defaultFirebaseConfig;

    const appId = typeof __app_id !== 'undefined' ? __app_id : 'jw-lost-found-system';

    try {
      const app = initializeApp(firebaseConfig);
      const auth = getAuth(app);
      const db = getFirestore(app);

      // React(Babel) 영역과 통신할 수 있도록 전역 window 변수에 적재
      window.firebaseApp = app;
      window.firebaseAuth = auth;
      window.firebaseDb = db;
      window.firebaseAppId = appId;
      window.firebaseImports = {
        doc, getDoc, setDoc, deleteDoc, updateDoc, onSnapshot, collection, signInAnonymously, signInWithCustomToken, onAuthStateChanged
      };
      window.firebaseReady = true;
    } catch (e) {
      console.error("Firebase 초기화 중 에러 발생:", e);
      window.firebaseReady = false;
    }
  </script>

  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Lucide Icons 매핑 헬퍼 컴포넌트
    const Icon = ({ name, className = "w-5 h-5", ...props }) => {
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      }, [name, className]);
      
      return (
        <span 
          {...props} 
          style={{ display: 'contents' }} 
          dangerouslySetInnerHTML={{ __html: `<i data-lucide="${name}" class="${className}"></i>` }}
        />
      );
    };

    // 이미지 용량 초과 방지용 자동 압축/리사이징 헬퍼
    const resizeAndCompressImage = (file, maxWidth = 800, maxHeight = 800, quality = 0.6) => {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = (event) => {
          const img = new Image();
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            if (width > height) {
              if (width > maxWidth) {
                height = Math.round((height * maxWidth) / width);
                width = maxWidth;
              }
            } else {
              if (height > maxHeight) {
                width = Math.round((width * maxHeight) / height);
                height = maxHeight;
              }
            }

            canvas.width = width;
            canvas.height = height;
            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            // 가볍고 가용성 높은 JPEG 형식으로 강제 압축 인코딩
            const dataUrl = canvas.toDataURL('image/jpeg', quality);
            resolve(dataUrl);
          };
          img.onerror = (err) => reject(err);
          img.src = event.target.result;
        };
        reader.onerror = (err) => reject(err);
        reader.readAsDataURL(file);
      });
    };

    // 초기 오프라인 기본 모의 데이터
    const initialItems = [
      {
        id: 'mock-1',
        type: 'lost',
        title: '아이패드 에어 5세대 (스페이스 그레이)',
        category: '전자기기',
        location: '2학년 3반 교실 뒤쪽 사물함 근처',
        date: '2026-07-09',
        status: 'active',
        description: '검은색 스마트 폴리오 케이스가 끼워져 있습니다. 뒷면에 고양이 스티커가 붙어있어요. 소중한 필기 자료가 들어있습니다.',
        reporter: '홍길동(2-3)',
        password: '0000',
        phone: '010-1234-5678',
        image: 'https://images.unsplash.com/photo-1544244015-0df4b3ffc6b0?w=500&auto=format&fit=crop&q=60',
        createdAt: Date.now() - 3600000
      },
      {
        id: 'mock-2',
        type: 'found',
        title: '검은색 나이키 가죽 지갑',
        category: '가방/지갑',
        location: '운동장 스탠드 2번째 줄',
        date: '2026-07-10',
        status: 'active',
        description: '지갑 내부에 정왕고등학교 학생증(3학년 이영희)과 소량의 현금이 들어있습니다. 현재 행정실에서 보관 중입니다.',
        reporter: '학생회 습득물 보관소',
        password: '0000',
        phone: '행정실 방문 문의',
        image: '',
        createdAt: Date.now()
      }
    ];

    function App() {
      const [darkMode, setDarkMode] = useState(() => {
        return localStorage.getItem('jw_dark_mode') === 'true';
      });
      
      const [user, setUser] = useState(null);
      const [items, setItems] = useState([]);
      const [loading, setLoading] = useState(true);
      const [isSyncing, setIsSyncing] = useState(false);
      const [isFallbackMode, setIsFallbackMode] = useState(false);

      // 필터 및 탭
      const [activeTab, setActiveTab] = useState('all');
      const [selectedCategory, setSelectedCategory] = useState('all');
      const [statusFilter, setStatusFilter] = useState('active');
      const [searchQuery, setSearchQuery] = useState('');
      
      // 모달 제어
      const [isRegisterOpen, setIsRegisterOpen] = useState(false);
      const [selectedItem, setSelectedItem] = useState(null);
      const [isMapOpen, setIsMapOpen] = useState(false);
      const [mapScale, setMapScale] = useState(1); // 배치도 확대 비율 상태 추가

      // 등록 입력값 관리
      const [formData, setFormData] = useState({
        type: 'lost',
        title: '',
        category: '전자기기',
        location: '',
        date: new Date().toISOString().split('T')[0],
        description: '',
        reporter: '',
        password: '',
        phone: '',
        imagePreview: ''
      });

      const [verifyAction, setVerifyAction] = useState(null); 
      const [verifyPassword, setVerifyPassword] = useState('');
      const [toast, setToast] = useState({ show: false, message: '', type: 'success' });

      // 모달이 열렸을 때 배경 화면이 이리저리 스크롤되는 현상 방지
      useEffect(() => {
        if (isRegisterOpen || selectedItem || isMapOpen) {
          document.body.style.overflow = 'hidden';
        } else {
          document.body.style.overflow = 'unset';
        }
        return () => { document.body.style.overflow = 'unset'; };
      }, [isRegisterOpen, selectedItem, isMapOpen]);

      const showToast = (message, type = 'success') => {
        setToast({ show: true, message, type });
        setTimeout(() => setToast({ show: false, message: '', type: 'success' }), 4000);
      };

      // 다크모드 적용 효과
      useEffect(() => {
        localStorage.setItem('jw_dark_mode', darkMode);
        if (darkMode) {
          document.documentElement.classList.add('dark');
        } else {
          document.documentElement.classList.remove('dark');
        }
      }, [darkMode]);

      const getLocalItems = () => {
        const saved = localStorage.getItem('jw_local_items_fallback');
        return saved ? JSON.parse(saved) : initialItems;
      };

      const saveLocalItems = (newItems) => {
        localStorage.setItem('jw_local_items_fallback', JSON.stringify(newItems));
      };

      // 파이어베이스 인증 관리 수동 결합 루틴
      useEffect(() => {
        let isMounted = true;
        
        const initFirebaseAndAuth = async () => {
          let attempts = 0;
          // 비동기로 적재되는 window.firebaseReady 상태를 감지하기 위해 루프 사용
          while (!window.firebaseReady && attempts < 30) {
            await new Promise(resolve => setTimeout(resolve, 100));
            attempts++;
          }

          if (!window.firebaseReady || !window.firebaseAuth) {
            if (isMounted) {
              setIsFallbackMode(true);
              setItems(getLocalItems());
              setLoading(false);
              showToast("실시간 DB 연동을 시작할 수 없어 로컬 모드로 전환합니다.", "error");
            }
            return;
          }

          const auth = window.firebaseAuth;
          const { signInWithCustomToken, signInAnonymously, onAuthStateChanged } = window.firebaseImports;

          try {
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
              await signInWithCustomToken(auth, __initial_auth_token);
            } else {
              await signInAnonymously(auth);
            }
          } catch (error) {
            console.warn("인증 처리 실패, 익명 로그인 재시도:", error.message);
            try {
              await signInAnonymously(auth);
            } catch (err2) {
              if (isMounted) {
                setIsFallbackMode(true);
                setItems(getLocalItems());
                setLoading(false);
                showToast("안전 로컬 오프라인 모드로 활성화됩니다.", "error");
              }
              return;
            }
          }

          // 상태 리스너 부착
          const unsubscribe = onAuthStateChanged(auth, (currUser) => {
            if (isMounted) {
              setUser(currUser);
              if (currUser) {
                setIsFallbackMode(false);
              }
            }
          });

          return unsubscribe;
        };

        let firebaseUnsubscribe;
        initFirebaseAndAuth().then(unsub => {
          if (unsub) firebaseUnsubscribe = unsub;
        });

        return () => {
          isMounted = false;
          if (firebaseUnsubscribe) firebaseUnsubscribe();
        };
      }, []);

      // 실시간 데이터 수신 리스너
      useEffect(() => {
        if (!user || isFallbackMode || !window.firebaseReady) return;

        setLoading(true);
        const db = window.firebaseDb;
        const appId = window.firebaseAppId;
        const { collection, onSnapshot } = window.firebaseImports;

        // RULE 1: 엄격한 컬렉션 경로 준수
        const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'items');
        
        const unsubscribe = onSnapshot(
          collectionRef,
          (snapshot) => {
            const fetched = [];
            snapshot.forEach((doc) => {
              fetched.push({ id: doc.id, ...doc.data() });
            });

            // RULE 2: 클라이언트 단에서 정렬
            fetched.sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

            setItems(fetched);
            saveLocalItems(fetched);
            setLoading(false);
          },
          (error) => {
            console.error("실시간 스트리밍 바인딩 에러:", error);
            setIsFallbackMode(true);
            setItems(getLocalItems());
            setLoading(false);
          }
        );

        return () => unsubscribe();
      }, [user, isFallbackMode]);

      // 이미지 전선택 및 실시간 압축 핸들러
      const handleFileChange = async (e) => {
        const file = e.target.files[0];
        if (!file) return;
        
        showToast('이미지를 최적화하는 중입니다. 잠시만 기다려주세요...', 'info');

        try {
          // 용량 제한 해결을 위해 가로세로 최대 800px 크기의 경량 JPEG로 압축 변환
          const compressedBase64 = await resizeAndCompressImage(file, 800, 800, 0.65);
          setFormData(prev => ({ ...prev, imagePreview: compressedBase64 }));
          showToast('이미지 업로드 준비가 완료되었습니다!');
        } catch (error) {
          console.error("이미지 압축 중 에러:", error);
          showToast('이미지 가공 처리에 실패했습니다. 다른 사진으로 시도해 주세요.', 'error');
        }
      };

      // 신규 물품 등록 제출 핸들러
      const handleRegisterSubmit = async (e) => {
        e.preventDefault();
        if (!formData.title || !formData.location || !formData.description || !formData.reporter || !formData.password) {
          showToast('필수 항목들을 채워주세요.', 'error');
          return;
        }

        if (formData.password.length !== 4) {
          showToast('비밀번호는 정확히 4자리여야 합니다.', 'error');
          return;
        }

        if (['1111', '1234', '0000'].includes(formData.password)) {
          showToast('너무 쉬운 비밀번호(1111, 1234, 0000)는 사용할 수 없습니다.', 'error');
          return;
        }

        setIsSyncing(true);
        const newItemId = `item-${Date.now()}`;
        const newItem = {
          id: newItemId,
          type: formData.type,
          title: formData.title,
          category: formData.category,
          location: formData.location,
          date: formData.date,
          description: formData.description,
          reporter: formData.reporter,
          password: formData.password,
          phone: formData.phone || '연락처 미지정',
          image: formData.imagePreview || '',
          status: 'active',
          authorUid: user ? user.uid : 'anonymous',
          createdAt: Date.now()
        };

        if (isFallbackMode || !window.firebaseReady) {
          const nextItems = [newItem, ...items];
          setItems(nextItems);
          saveLocalItems(nextItems);
          showToast('브라우저에 정상 등록되었습니다. (로컬 모드)');
          setIsRegisterOpen(false);
          setIsSyncing(false);
          setFormData({
            type: 'lost', title: '', category: '전자기기', location: '',
            date: new Date().toISOString().split('T')[0], description: '',
            reporter: '', password: '', phone: '', imagePreview: ''
          });
          return;
        }

        try {
          const db = window.firebaseDb;
          const appId = window.firebaseAppId;
          const { doc, setDoc } = window.firebaseImports;

          // RULE 1: 지정된 안전 경로로 쓰기 처리
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'items', newItemId);
          await setDoc(docRef, newItem);

          showToast('클라우드에 안전하게 보존 및 동기화 처리되었습니다! 🎉');
          setIsRegisterOpen(false);
          
          setFormData({
            type: 'lost', title: '', category: '전자기기', location: '',
            date: new Date().toISOString().split('T')[0], description: '',
            reporter: '', password: '', phone: '', imagePreview: ''
          });
        } catch (error) {
          console.error("클라우드 등록 실패:", error);
          showToast('클라우드에 전송하지 못했습니다. 로컬 저장을 이용해주세요.', 'error');
        } finally {
          setIsSyncing(false);
        }
      };

      const closeDetailModal = () => {
        setSelectedItem(null);
        setVerifyAction(null);
        setVerifyPassword('');
      };

      // 비밀번호 기반 게시글 통제 루틴
      const executeItemAction = async () => {
        if (!verifyPassword) {
          showToast('비밀번호를 기입해 주십시오.', 'error');
          return;
        }

        if (selectedItem.password !== verifyPassword) {
          showToast('인증 비밀번호가 잘못되었습니다.', 'error');
          return;
        }

        setIsSyncing(true);

        if (isFallbackMode || !window.firebaseReady) {
          if (verifyAction === 'resolve') {
            const nextStatus = selectedItem.status === 'active' ? 'resolved' : 'active';
            const updated = items.map(i => i.id === selectedItem.id ? { ...i, status: nextStatus } : i);
            setItems(updated);
            saveLocalItems(updated);
            setSelectedItem({ ...selectedItem, status: nextStatus });
            showToast('로컬 변경이 무사히 진행되었습니다.');
          } else if (verifyAction === 'delete') {
            const filtered = items.filter(i => i.id !== selectedItem.id);
            setItems(filtered);
            saveLocalItems(filtered);
            showToast('게시글이 로컬 캐시에서 삭제되었습니다.');
            closeDetailModal();
          }
          setVerifyAction(null);
          setVerifyPassword('');
          setIsSyncing(false);
          return;
        }

        try {
          const db = window.firebaseDb;
          const appId = window.firebaseAppId;
          const { doc, updateDoc, deleteDoc } = window.firebaseImports;
          
          const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'items', selectedItem.id);

          if (verifyAction === 'resolve') {
            const nextStatus = selectedItem.status === 'active' ? 'resolved' : 'active';
            await updateDoc(docRef, { status: nextStatus });
            
            setSelectedItem({ ...selectedItem, status: nextStatus });
            showToast(nextStatus === 'resolved' ? '🎉 해결된 물건으로 변경을 완료했습니다!' : '상태를 변경으로 되돌렸습니다.');
          } 
          else if (verifyAction === 'delete') {
            await deleteDoc(docRef);
            showToast('데이터베이스에서 영구 삭제 처리되었습니다.');
            closeDetailModal();
            return;
          }
          setVerifyAction(null);
          setVerifyPassword('');
        } catch (err) {
          console.error("수정/삭제 실패:", err);
          showToast('수행 중 서버 장애가 발생했습니다.', 'error');
        } finally {
          setIsSyncing(false);
        }
      };

      // 클립보드 복사 유틸 (iframe 환경 대응)
      const copyToClipboard = (text) => {
        const textarea = document.createElement('textarea');
        textarea.value = text;
        textarea.style.position = 'fixed';
        document.body.appendChild(textarea);
        textarea.select();
        try {
          document.execCommand('copy');
          showToast('게시글 주요 정보가 클립보드에 복사되었습니다! 📋');
        } catch (err) {
          showToast('복사에 실패했습니다.', 'error');
        }
        document.body.removeChild(textarea);
      };

      const filteredItems = items.filter(item => {
        if (activeTab !== 'all' && item.type !== activeTab) return false;
        if (selectedCategory !== 'all' && item.category !== selectedCategory) return false;
        if (statusFilter === 'active' && item.status !== 'active') return false;
        if (statusFilter === 'resolved' && item.status !== 'resolved') return false;
        
        if (searchQuery.trim() !== '') {
          const q = searchQuery.toLowerCase();
          return (
            (item.title && item.title.toLowerCase().includes(q)) || 
            (item.location && item.location.toLowerCase().includes(q)) || 
            (item.description && item.description.toLowerCase().includes(q)) || 
            (item.reporter && item.reporter.toLowerCase().includes(q))
          );
        }
        return true;
      });

      const stats = {
        total: items.length,
        lost: items.filter(i => i.type === 'lost' && i.status === 'active').length,
        found: items.filter(i => i.type === 'found' && i.status === 'active').length,
        resolved: items.filter(i => i.status === 'resolved').length
      };

      return (
        <div className="min-h-screen flex flex-col font-sans">
          
          {/* Header */}
          <header className={`sticky top-0 z-30 shadow-sm border-b backdrop-blur-md transition-colors ${darkMode ? 'bg-slate-900/95 border-slate-800' : 'bg-white/95 border-slate-200'}`}>
            <div className="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
              <div className="flex items-center space-x-2 sm:space-x-3 min-w-0">
                <span className="text-2xl sm:text-3xl animate-pulse shrink-0">🏫</span>
                <div className="min-w-0">
                  <h1 className="text-sm sm:text-lg md:text-xl font-extrabold tracking-tight leading-tight flex flex-wrap items-center">
                    <span className="whitespace-nowrap">정왕고</span>
                    <span className="text-indigo-600 dark:text-indigo-400 ml-1 whitespace-nowrap">실시간 분실물 센터</span>
                  </h1>

                        type="button"
                        onClick={() => setFormData({ ...formData, type: 'lost' })}
                        className={`py-2 text-sm font-bold rounded-lg transition ${formData.type === 'lost' ? 'bg-rose-500 text-white shadow-md' : 'text-slate-500'}`}
                      >
                        물건을 잃어버렸어요
                      </button>
                      <button
                        type="button"
                        onClick={() => setFormData({ ...formData, type: 'found' })}
                        className={`py-2 text-sm font-bold rounded-lg transition ${formData.type === 'found' ? 'bg-emerald-600 text-white shadow-md' : 'text-slate-500'}`}
                      >
                        물건을 보관중이에요
                      </button>
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 mb-1">물품명 *</label>
                    <input
                      type="text"
                      placeholder="예: 아이폰 14 화이트, 노란색 필통"
                      value={formData.title}
                      onChange={(e) => setFormData({ ...formData, title: e.target.value })}
                      className={`w-full p-2.5 rounded-lg border text-base sm:text-sm ${darkMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-200'}`}
                      required
                    />
                  </div>

                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3">
                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-1">카테고리 *</label>
                      <select
                        value={formData.category}
                        onChange={(e) => setFormData({ ...formData, category: e.target.value })}
                        className={`w-full p-2.5 rounded-lg border text-base sm:text-sm ${darkMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-200'}`}
                      >
                        <option value="전자기기">🖥️ 전자기기</option>
                        <option value="가방/지갑">👛 가방/지갑</option>
                        <option value="의류">👕 의류</option>
                        <option value="문구류">✏️ 문구류</option>
                        <option value="스포츠용품">⚽ 스포츠용품</option>
                        <option value="기타">🎁 기타</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-1">일시 *</label>
                      <input
                        type="date"
                        value={formData.date}
                        onChange={(e) => setFormData({ ...formData, date: e.target.value })}
                        className={`w-full p-2.5 rounded-lg border text-base sm:text-sm ${darkMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-200'}`}
                        required
                      />
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 mb-1">위치/장소 *</label>
                    <input
                      type="text"
                      placeholder="예: 2층 중앙현관 앞 복도, 급식실 입구"
                      value={formData.location}
                      onChange={(e) => setFormData({ ...formData, location: e.target.value })}
                      className={`w-full p-2.5 rounded-lg border text-base sm:text-sm ${darkMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-200'}`}
                      required
                    />
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 mb-1">상세 설명 및 특징 *</label>
                    <textarea
                      rows="3"
                      placeholder="스크래치, 부착된 캐릭터 키링 등 특징을 자세히 기재하면 더 쉽게 찾을 수 있습니다."
                      value={formData.description}
                      onChange={(e) => setFormData({ ...formData, description: e.target.value })}
                      className={`w-full p-2.5 rounded-lg border text-base sm:text-sm ${darkMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-200'}`}
                      required
                    ></textarea>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 mb-1">사진 파일 첨부 (대용량 사진 자동최적화 지원)</label>
                    <div className={`mt-1 flex items-center justify-center px-6 pt-5 pb-6 border-2 border-dashed rounded-lg ${darkMode ? 'border-slate-700 bg-slate-800' : 'border-slate-300 bg-slate-50'}`}>
                      <div className="space-y-1 text-center">
                        {formData.imagePreview ? (
                          <div className="relative inline-block">
                            <img 
                              src={formData.imagePreview} 
                              alt="미리보기" 
                              className="h-32 w-auto rounded-lg object-cover border border-indigo-500/30"
                            />
                            <button
                              type="button"
                              onClick={() => setFormData(prev => ({ ...prev, imagePreview: '' }))}
                              className="absolute -top-2 -right-2 bg-red-600 text-white rounded-full p-1 shadow hover:bg-red-700 transition"
                            >
                              <Icon name="x" className="w-3 h-3" />
                            </button>
                          </div>
                        ) : (
                          <>
                            <Icon name="upload" className="mx-auto h-12 w-12 text-slate-400" />
                            <div className="flex text-sm text-slate-500 justify-center">
                              <label className="relative cursor-pointer bg-transparent rounded-md font-semibold text-indigo-600 hover:text-indigo-500">
                                <span className="p-1 px-3 bg-indigo-50 dark:bg-indigo-950 rounded-lg hover:bg-indigo-100 dark:hover:bg-indigo-900 transition">이미지 업로드</span>
                                <input 
                                  type="file" 
                                  accept="image/*" 
                                  className="sr-only" 
                                  onChange={handleFileChange}
                                />
                              </label>
                            </div>
                            <p className="text-xs text-slate-400 mt-2">어떠한 해상도의 사진도 자동 압축 처리됩니다.</p>
                          </>
                        )}
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 sm:grid-cols-2 gap-3 pt-3 border-t border-slate-100 dark:border-slate-700/50">
                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-1">작성자 닉네임 *</label>
                      <input
                        type="text"
                        placeholder="예: 2학년 이철수"
                        value={formData.reporter}
                        onChange={(e) => setFormData({ ...formData, reporter: e.target.value })}
                        className={`w-full p-2.5 rounded-lg border text-base sm:text-sm ${darkMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-200'}`}
                        required
                      />
                    </div>
                    <div>
                      <label className="block text-xs font-bold text-slate-400 mb-1 flex items-center gap-1">
                        <Icon name="lock" className="w-3 h-3" /> 비밀번호 *
                      </label>
                      <input
                        type="password"
                        placeholder="숫자 4자리"
                        maxLength={4}
                        value={formData.password}
                        onChange={(e) => setFormData({ ...formData, password: e.target.value.replace(/[^0-9]/g, '') })}
                        className={`w-full p-2.5 rounded-lg border text-base sm:text-sm ${darkMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-200'}`}
                        required
                      />
                    </div>
                  </div>

                  <div>
                    <label className="block text-xs font-bold text-slate-400 mb-1">연락처 및 회수 방법 *</label>
                    <input
                      type="text"
                      placeholder="예: 010-XXXX-XXXX / 3학년 2반 교실로 방문 문의"
                      value={formData.phone}
                      onChange={(e) => setFormData({ ...formData, phone: e.target.value })}
                      className={`w-full p-2.5 rounded-lg border text-base sm:text-sm ${darkMode ? 'bg-slate-900 border-slate-700' : 'bg-slate-50 border-slate-200'}`}
                      required
                    />
                  </div>

                  <div className="pt-4 flex gap-2">
                    <button
                      type="button"
                      onClick={() => setIsRegisterOpen(false)}
                      className="flex-1 py-3 text-sm font-semibold rounded-lg bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 transition"
                      disabled={isSyncing}
                    >
                      취소
                    </button>
                    <button
                      type="submit"
                      className="flex-1 py-3 text-sm font-semibold text-white rounded-lg bg-indigo-600 hover:bg-indigo-700 shadow-md transition flex items-center justify-center space-x-2"
                      disabled={isSyncing}
                    >
                      {isSyncing && <div className="animate-spin rounded-full h-4 w-4 border-2 border-white border-t-transparent"></div>}
                      <span>등록하기</span>
                    </button>
                  </div>
                </form>
              </div>
            </div>
          )}

          {}
          {/* Item Detailed Modal */}
          {selectedItem && (
            <div className="fixed inset-0 z-50 overflow-y-auto flex items-center justify-center p-4 bg-slate-900/60 backdrop-blur-sm">
              <div className={`w-full max-w-2xl rounded-2xl shadow-2xl overflow-hidden border transition-all ${darkMode ? 'bg-slate-800 border-slate-700 text-slate-100' : 'bg-white border-slate-200'}`}>
                <div className="p-5 border-b border-slate-100 dark:border-slate-700 flex justify-between items-center">
                  <div className="flex items-center space-x-2">
                    {selectedItem.type === 'lost' ? (
                      <span className="px-2 py-0.5 bg-rose-500 text-white text-xs font-black rounded">분실물</span>
                    ) : (
                      <span className="px-2 py-0.5 bg-emerald-600 text-white text-xs font-black rounded">습득물</span>
                    )}
                    <span className="text-sm font-bold text-slate-400">{selectedItem.category}</span>
                  </div>
                  <button onClick={closeDetailModal} className="p-1.5 rounded-lg hover:bg-slate-100 dark:hover:bg-slate-700 transition">
                    <Icon name="x" className="w-5 h-5" />
                  </button>
                </div>

                <div className="p-5 space-y-6 max-h-[80vh] overflow-y-auto">
                  <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                    <div className="h-56 bg-slate-100 dark:bg-slate-900 rounded-xl overflow-hidden border border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-400 text-sm">
                      {selectedItem.image ? (
                        <img src={selectedItem.image} alt={selectedItem.title} className="w-full h-full object-cover" />
                      ) : (
                        <div className="text-center p-4">
                          <span className="text-4xl block mb-2">📸</span>
                          <span>등록된 사진이 없습니다.</span>
                        </div>
                      )}
                    </div>

                    <div className="flex flex-col justify-between">
                      <div>
                        <h2 className="text-xl font-extrabold leading-tight">{selectedItem.title}</h2>
                        <div className="mt-3 space-y-2 text-sm">
                          <div className="flex items-center text-slate-600 dark:text-slate-300">
                            <Icon name="map-pin" className="w-4 h-4 text-indigo-500 mr-2 shrink-0" />
                            <span><strong>위치:</strong> {selectedItem.location}</span>
                          </div>
                          <div className="flex items-center text-slate-600 dark:text-slate-300">
                            <Icon name="calendar" className="w-4 h-4 text-indigo-500 mr-2 shrink-0" />
                            <span><strong>일자:</strong> {selectedItem.date}</span>
                          </div>
                          <div className="flex items-center text-slate-600 dark:text-slate-300">
                            <Icon name="user" className="w-4 h-4 text-indigo-500 mr-2 shrink-0" />
                            <span><strong>작성자:</strong> {selectedItem.reporter}</span>
                          </div>
                        </div>
                      </div>

                      <div className="pt-4 border-t border-slate-100 dark:border-slate-700/50 mt-4">
                        {!verifyAction ? (
                          <div className="grid grid-cols-2 gap-2">
                            <button
                              onClick={() => setVerifyAction('resolve')}
                              className={`py-2.5 rounded-lg text-xs font-black transition flex items-center justify-center space-x-1 shadow-sm ${selectedItem.status === 'resolved' ? 'bg-amber-100 text-amber-800 dark:bg-amber-950 dark:text-amber-200' : 'bg-blue-600 text-white'}`}
                              disabled={isSyncing}
                            >
                              <Icon name="check-circle" className="w-3.5 h-3.5" />
                              <span>{selectedItem.status === 'resolved' ? '찾는 중으로 전환' : '해결 완료 처리'}</span>
                            </button>
                            <button
                              onClick={() => setVerifyAction('delete')}
                              className="py-2.5 rounded-lg text-xs font-black transition flex items-center justify-center space-x-1 shadow-sm bg-slate-100 text-red-600 dark:bg-slate-800 dark:text-red-400"
                              disabled={isSyncing}
                            >
                              <Icon name="trash-2" className="w-3.5 h-3.5" />
                              <span>게시글 영구 삭제</span>
                            </button>
                          </div>
                        ) : (
                          <div className="p-3 bg-slate-100 dark:bg-slate-800 rounded-lg border border-slate-200 dark:border-slate-700 space-y-2">
                            <p className="text-xs font-bold text-slate-600 dark:text-slate-300">
                              {verifyAction === 'resolve' ? '상태 변경을' : '글 삭제를'} 위해 등록 비밀번호를 입력해주세요.
                            </p>
                            <div className="flex flex-col sm:flex-row gap-2 mt-2">
                              <input 
                                type="password"
                                placeholder="비밀번호"
                                value={verifyPassword}
                                onChange={(e) => setVerifyPassword(e.target.value)}
                                className="w-full sm:flex-1 px-3 py-2 text-base sm:text-sm rounded border border-slate-300 dark:border-slate-600 bg-white dark:bg-slate-900"
                              />
                              <div className="flex gap-2 w-full sm:w-auto">
                                <button 
                                  onClick={executeItemAction} 
                                  className="flex-1 sm:flex-none px-4 py-2 bg-indigo-600 text-white text-xs font-bold rounded hover:bg-indigo-700 transition flex items-center justify-center space-x-1"
                                  disabled={isSyncing}
                                >
                                  {isSyncing && <div className="animate-spin rounded-full h-3 w-3 border-2 border-white border-t-transparent"></div>}
                                  <span>확인</span>
                                </button>
                                <button 
                                  onClick={() => {setVerifyAction(null); setVerifyPassword('');}} 
                                  className="flex-1 sm:flex-none px-3 py-2 bg-slate-300 text-slate-700 dark:bg-slate-700 dark:text-slate-200 text-xs font-bold rounded text-center"
                                >
                                  취소
                                </button>
                              </div>
                            </div>
                          </div>
                        )}
                      </div>
                    </div>
                  </div>

                  <div className="space-y-4">
                    <div className="p-4 rounded-xl bg-slate-50 dark:bg-slate-900/60 border border-slate-100 dark:border-slate-800">
                      <h4 className="text-xs font-black text-slate-400 mb-2">상세 내역 및 특징</h4>
                      <p className="text-sm leading-relaxed whitespace-pre-line text-slate-700 dark:text-slate-300">{selectedItem.description}</p>
                    </div>

                    <div className="p-4 rounded-xl bg-indigo-50/50 dark:bg-indigo-950/10 border border-indigo-100/30">
                      <h4 className="text-xs font-black text-indigo-600 dark:text-indigo-400 mb-2">📞 연락 및 대면 수령 방법</h4>
                      <p className="text-sm font-bold text-indigo-800 dark:text-indigo-200">{selectedItem.phone}</p>
                    </div>
                  </div>

                  <div className="pt-4 border-t border-slate-100 dark:border-slate-700/50 text-center">
                    <button
                      onClick={closeDetailModal}
                      className="px-8 py-3 bg-slate-100 hover:bg-slate-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-slate-700 dark:text-slate-200 rounded-xl transition text-sm font-extrabold"
                    >
                      닫기
                    </button>
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* Toast Notification */}
          {toast.show && (
            <div className="fixed bottom-6 right-6 z-50">
              <div className="px-4 py-3 rounded-xl shadow-xl flex items-center space-x-2 border text-sm font-bold text-white bg-slate-900 dark:bg-indigo-950 border-slate-800 dark:border-indigo-800 animate-fade-in-up">
                <span>📢</span>
                <span>{toast.message}</span>
              </div>
            </div>
          )}

          {/* Footer */}
          <footer className={`py-8 border-t text-center text-xs transition-colors mt-auto ${darkMode ? 'bg-slate-950 border-slate-800 text-slate-500' : 'bg-slate-100 border-slate-200 text-slate-500'}`}>
            <p>Copyright © 2026 Jeongwang High School Live Lost-Found System. All Rights Reserved.</p>
          </footer>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
